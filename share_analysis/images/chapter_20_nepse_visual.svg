<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='620' viewBox='0 0 1200 620'>
  <rect width='1200' height='620' fill='#ffffff'/>
  <rect x='30' y='30' width='1140' height='560' rx='24' fill='#f8fafc' stroke='#0f172a' stroke-width='2'/>
  <text x='70' y='88' font-size='34' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Chapter 20: Portfolio Management and Risk</text>
  <text x='70' y='124' font-size='20' font-family='Arial, sans-serif' fill='#334155'>NEPSE visual guide — follow the flow from evidence to decision.</text>
  <rect x='860' y='58' width='250' height='56' rx='14' fill='#0ea5e9'/>
  <text x='985' y='92' text-anchor='middle' font-size='22' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>Balanced mix of banks, telecom, insurance, and hydro</text>
  <rect x='70' y='160' width='1060' height='70' rx='16' fill='#ecfeff' stroke='#0f172a' stroke-width='1.5'/><text x='95' y='188' font-size='24' font-family='Arial, sans-serif' fill='#0f172a' font-weight='700'>1. The Principles of Portfolio Construction</text><text x='95' y='214' font-size='17' font-family='Arial, sans-serif' fill='#334155'>Use sector weights, cash levels, and liquidity limits to shape a practical NEPSE portfolio.</text><rect x='70' y='255' width='1060' height='70' rx='16' fill='#eff6ff' stroke='#0f172a' stroke-width='1.5'/><text x='95' y='283' font-size='24' font-family='Arial, sans-serif' fill='#0f172a' font-weight='700'>2. Asset Allocation Strategies</text><text x='95' y='309' font-size='17' font-family='Arial, sans-serif' fill='#334155'>Decide how much capital belongs in banks, telecom, insurance, hydro, and cash at this stage of the cycle.</text><rect x='70' y='350' width='1060' height='70' rx='16' fill='#f5f3ff' stroke='#0f172a' stroke-width='1.5'/><text x='95' y='378' font-size='24' font-family='Arial, sans-serif' fill='#0f172a' font-weight='700'>3. The Importance of Diversification</text><text x='95' y='404' font-size='17' font-family='Arial, sans-serif' fill='#334155'>Spread risk across sectors and liquidity profiles so one crowded trade does not dominate the result.</text><rect x='70' y='445' width='1060' height='70' rx='16' fill='#ecfccb' stroke='#0f172a' stroke-width='1.5'/><text x='95' y='473' font-size='24' font-family='Arial, sans-serif' fill='#0f172a' font-weight='700'>4. Modern Portfolio Theory: The Efficient Frontier</text><text x='95' y='499' font-size='17' font-family='Arial, sans-serif' fill='#334155'>Estimate the return you want for a given NEPSE risk level, then compare that target with real execution constraints.</text>
  <text x='70' y='570' font-size='18' font-family='Arial, sans-serif' fill='#334155'>Use this image to review the chapter quickly before reading company filings, charts, or corporate action notices.</text>
</svg>