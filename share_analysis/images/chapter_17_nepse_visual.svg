<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='620' viewBox='0 0 1200 620'>
  <rect width='1200' height='620' fill='#ffffff'/>
  <rect x='30' y='30' width='1140' height='560' rx='24' fill='#f8fafc' stroke='#0f172a' stroke-width='2'/>
  <text x='70' y='88' font-size='34' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Chapter 17: Behavioral Finance – The Investor&#x27;s Psychology</text>
  <text x='70' y='124' font-size='20' font-family='Arial, sans-serif' fill='#334155'>NEPSE visual guide — follow the flow from evidence to decision.</text>
  <rect x='860' y='58' width='250' height='56' rx='14' fill='#0ea5e9'/>
  <text x='985' y='92' text-anchor='middle' font-size='22' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>Retail trading behavior</text>
  <rect x='70' y='160' width='1060' height='70' rx='16' fill='#ecfeff' stroke='#0f172a' stroke-width='1.5'/><text x='95' y='188' font-size='24' font-family='Arial, sans-serif' fill='#0f172a' font-weight='700'>1. The Rise of Behavioral Finance</text><text x='95' y='214' font-size='17' font-family='Arial, sans-serif' fill='#334155'>It explains why NEPSE prices can overshoot when narratives outrun evidence.</text><rect x='70' y='255' width='1060' height='70' rx='16' fill='#eff6ff' stroke='#0f172a' stroke-width='1.5'/><text x='95' y='283' font-size='24' font-family='Arial, sans-serif' fill='#0f172a' font-weight='700'>2. Common Cognitive Biases</text><text x='95' y='309' font-size='17' font-family='Arial, sans-serif' fill='#334155'>Watch anchoring, confirmation bias, and overconfidence in familiar counters.</text><rect x='70' y='350' width='1060' height='70' rx='16' fill='#f5f3ff' stroke='#0f172a' stroke-width='1.5'/><text x='95' y='378' font-size='24' font-family='Arial, sans-serif' fill='#0f172a' font-weight='700'>3. Emotional Pitfalls: Fear, Greed, and Regret</text><text x='95' y='404' font-size='17' font-family='Arial, sans-serif' fill='#334155'>These usually appear after sharp rallies, panics, or missed entries.</text><rect x='70' y='445' width='1060' height='70' rx='16' fill='#ecfccb' stroke='#0f172a' stroke-width='1.5'/><text x='95' y='473' font-size='24' font-family='Arial, sans-serif' fill='#0f172a' font-weight='700'>4. How to Build a Process to Overcome Emotional Decisions</text><text x='95' y='499' font-size='17' font-family='Arial, sans-serif' fill='#334155'>Use checklists, sizing rules, and review notes to prevent emotional overrides.</text>
  <text x='70' y='570' font-size='18' font-family='Arial, sans-serif' fill='#334155'>Use this image to review the chapter quickly before reading company filings, charts, or corporate action notices.</text>
</svg>